# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d_%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# if %%.2d_%%(day).2d_%%(hour).2d_%%(minute).2d is used.
# leave blank for local time or use "UTC" for UTC.
# timezone =

# max length of characters to prepend to revision identifier of filenames.
# truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc files to be created; otherwise, the .pyc files are not created
# sourceless = false

# version location specification; This defaults to alembic/versions.  When using multiple version
# directories, separate them with semicolons
# version_locations = %(here)s/alembic/versions

# the output encoding used when writing new migration files
# output_encoding = utf-8

sqlalchemy.url = sqlite:///./cloudsentinel.db


[post_write_hooks]
# post_write_hooks allows scripts to be run after a "revision" command
# is executed. These hooks can be used to format the generated
# revision file or run a linter.

# format using "black" - requires "black" to be installed in the same venv
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME


[logging]
# default logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
